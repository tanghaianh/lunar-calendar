<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none">
  <!-- candles -->
  <rect x="5.5" y="1.5" width="1.2" height="3.5" rx="0.5" fill="#f4a261"/>
  <rect x="9.4" y="0.5" width="1.2" height="3.5" rx="0.5" fill="#f4a261"/>
  <rect x="13.3" y="1.5" width="1.2" height="3.5" rx="0.5" fill="#f4a261"/>
  <!-- flames -->
  <ellipse cx="6.1" cy="1.2" rx="0.7" ry="0.9" fill="#e63946"/>
  <ellipse cx="10" cy="0.2" rx="0.7" ry="0.9" fill="#e63946"/>
  <ellipse cx="13.9" cy="1.2" rx="0.7" ry="0.9" fill="#e63946"/>
  <!-- cake top layer -->
  <rect x="2.5" y="6" width="15" height="5" rx="2" fill="#ffb3c6"/>
  <!-- cake bottom layer -->
  <rect x="1.5" y="11" width="17" height="6" rx="2" fill="#ff85a1"/>
  <!-- frosting drips -->
  <circle cx="5" cy="11" r="1.5" fill="#fff"/>
  <circle cx="10" cy="11" r="1.5" fill="#fff"/>
  <circle cx="15" cy="11" r="1.5" fill="#fff"/>
